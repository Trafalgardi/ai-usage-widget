<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>AI Usage</title>
<style>
  :root{
    --shell:#101012; --shell-line:#232327; --shell-text:#8b8b93;
    /* Claude / Anthropic */
    --cl-bg:#F5F1E8; --cl-ink:#2A261E; --cl-dim:#8a8272; --cl-accent:#D97757; --cl-track:#e6ddcc;
    /* Codex / OpenAI */
    --cx-bg:#0B0B0C; --cx-ink:#F2F2F2; --cx-dim:#8E8E93; --cx-track:#232326; --cx-accent:#ffffff;
    /* OpenCode */
    --oc-bg:#070707; --oc-ink:#EDEDED; --oc-dim:#6f6f6f; --oc-accent:#fab283; --oc-track:#1c1c1c;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-user-select:none; user-select:none}
  html,body{height:100%}
  body{
    background:var(--shell); color:var(--shell-text); overflow:hidden;
    font:12px/1.45 "Segoe UI", system-ui, sans-serif;
    border:1px solid var(--shell-line); border-radius:14px;
  }
  .serif{font-family:"Charter","Georgia","Times New Roman",serif}
  .mono{font-family:"Cascadia Code","JetBrains Mono","Consolas",monospace}

  /* ---------- каркас ---------- */
  #app{display:flex; flex-direction:column; height:100vh}
  header{
    flex:0 0 40px; display:flex; align-items:center; gap:8px; padding:0 10px 0 12px;
    border-bottom:1px solid var(--shell-line); cursor:move;
  }
  header .title{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#c9c9cf}
  header .updated{font-size:10px; margin-left:auto; color:#5c5c64}
  header .countdown{font-size:10px; color:#5c5c64; font-variant-numeric:tabular-nums; min-width:28px; text-align:right}
  header button{
    background:none; border:none; color:#7a7a82; font-size:14px; width:24px; height:24px;
    border-radius:6px; cursor:pointer; line-height:1;
  }
  header button:hover{background:#1d1d21; color:#e8e8ec}
  header button.pin-on{color:var(--cl-accent)}
  header button:focus-visible{outline:1px solid #5a5a64}

  #pages{flex:1; overflow:hidden; position:relative}
  .page{position:absolute; inset:0; overflow-y:auto; display:none}
  .page.active{display:block}
  .page::-webkit-scrollbar{width:0}

  nav{
    flex:0 0 34px; display:flex; align-items:stretch; border-top:1px solid var(--shell-line);
  }
  nav button{
    flex:1; background:none; border:none; color:#66666e; font-size:10px; letter-spacing:.08em;
    cursor:pointer; text-transform:uppercase; border-top:2px solid transparent;
  }
  nav button.active{color:#ececf1; border-top-color:#ececf1}
  nav button.n-claude.active{color:var(--cl-accent); border-top-color:var(--cl-accent)}
  nav button.n-codex.active{border-top-color:#fff; color:#fff}
  nav button.n-opencode.active{color:var(--oc-accent); border-top-color:var(--oc-accent)}

  /* ---------- обзор ---------- */
  .strip{padding:14px 16px 16px; border-bottom:1px solid rgba(0,0,0,.25); cursor:pointer}
  .strip .top{display:flex; align-items:baseline; gap:8px}
  .strip .glyph{font-size:13px}
  .strip .name{font-size:13px}
  .strip .pct{margin-left:auto; font-size:22px; font-weight:600}
  .strip .sub{display:flex; justify-content:space-between; font-size:10.5px; margin-top:2px}
  .bar{height:5px; border-radius:3px; margin-top:9px; overflow:hidden}
  .bar i{display:block; height:100%; border-radius:3px; transition:width .6s ease}

  /* Claude strip / page */
  .th-claude{background:var(--cl-bg); color:var(--cl-ink)}
  .th-claude .name{font-family:"Charter",Georgia,serif; letter-spacing:.01em}
  .th-claude .pct{font-family:"Charter",Georgia,serif; font-weight:500}
  .th-claude .sub{color:var(--cl-dim)}
  .th-claude .glyph{color:var(--cl-accent)}
  .th-claude .bar{background:var(--cl-track)}
  .th-claude .bar i{background:var(--cl-accent)}

  /* Codex strip / page */
  .th-codex{background:var(--cx-bg); color:var(--cx-ink)}
  .th-codex .name{font-weight:600; letter-spacing:-.01em}
  .th-codex .pct{font-weight:300; letter-spacing:-.02em}
  .th-codex .sub{color:var(--cx-dim)}
  .th-codex .glyph{color:#fff}
  .th-codex .bar{background:var(--cx-track)}
  .th-codex .bar i{background:linear-gradient(90deg,#d8d8d8,#ffffff)}

  /* OpenCode strip / page */
  .th-opencode{background:var(--oc-bg); color:var(--oc-ink);
    font-family:"Cascadia Code","JetBrains Mono",Consolas,monospace}
  .th-opencode .name{font-size:12px}
  .th-opencode .name::before{content:"▌"; color:var(--oc-accent); margin-right:4px}
  .th-opencode .pct{font-weight:400; font-size:20px}
  .th-opencode .sub{color:var(--oc-dim); font-size:10px}
  .th-opencode .bar{background:transparent; height:auto; margin-top:8px}
  .th-opencode .asciibar{font-size:11px; letter-spacing:1px; color:var(--oc-accent); white-space:nowrap}
  .th-opencode .asciibar .off{color:#2c2c2c}

  .strip .err{font-size:10.5px; margin-top:6px; opacity:.75; line-height:1.4}

  /* ---------- детальные страницы ---------- */
  .detail{min-height:100%; padding:18px 18px 24px}
  .detail .brand{display:flex; align-items:center; gap:8px; margin-bottom:2px}
  .detail .brand .glyph{font-size:16px}
  .detail h1{font-size:19px; font-weight:600}
  .th-claude.detail h1{font-family:"Charter",Georgia,serif; font-weight:500}
  .detail .plan{font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; opacity:.6; margin-bottom:14px}
  
  .token-status{
    display:inline-flex; align-items:center; gap:4px; padding:3px 8px;
    border-radius:10px; font-size:9px; font-weight:600; letter-spacing:.05em;
    text-transform:uppercase; margin-left:8px;
  }
  .token-status.valid{background:rgba(46,204,64,.15); color:#2ECC40}
  .token-status.expiring{background:rgba(255,193,7,.15); color:#FFC107}
  .token-status.expired{background:rgba(255,68,68,.15); color:#FF4444}
  .token-status .dot{width:6px; height:6px; border-radius:50%; background:currentColor}

  .win{margin-top:14px}
  .win .head{display:flex; align-items:baseline}
  .win .label{font-size:11px; letter-spacing:.1em; text-transform:uppercase; opacity:.65}
  .th-opencode .win .label{text-transform:none; letter-spacing:0}
  .th-opencode .win .label::before{content:"$ "}
  .win .bigpct{margin-left:auto; font-size:26px}
  .th-claude .win .bigpct{font-family:"Charter",Georgia,serif; color:var(--cl-ink)}
  .th-codex .win .bigpct{font-weight:200}
  .win .bigpct small{font-size:12px; opacity:.55}
  .win .bar{margin-top:7px}
  .win .reset{display:flex; justify-content:space-between; font-size:10.5px; margin-top:6px; opacity:.65}
  .win .usd{font-size:10.5px; margin-top:3px; opacity:.65}

  .detail .meta{margin-top:20px; padding-top:12px; border-top:1px dashed rgba(128,128,128,.35);
    font-size:10.5px; line-height:1.7; opacity:.75}
  .detail .error{
    margin-top:16px; font-size:11px; line-height:1.55; padding:10px 12px; border-radius:8px;
    background:rgba(128,128,128,.12); border:1px solid rgba(128,128,128,.25);
    -webkit-user-select:text; user-select:text;
  }
  .th-claude .error{background:#ece5d6; border-color:#d9cfb9; color:#6b6353}
  
  .login-btn{
    margin-top:12px; width:100%; padding:10px 16px; border:none; border-radius:8px;
    background:#2a2a2e; color:#ececf1; font-size:12px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .login-btn:hover:not(:disabled){background:#3a3a3e}
  .login-btn:disabled{opacity:.6; cursor:not-allowed}
  .th-claude .login-btn{background:#d97757; color:#fff}
  .th-claude .login-btn:hover:not(:disabled){background:#c96747}
  .th-codex .login-btn{background:#fff; color:#000}
  .th-codex .login-btn:hover:not(:disabled){background:#e0e0e0}

  .low i{background:#c8452c !important}
  .th-codex .low i{background:#ff5c47 !important}
  .th-opencode .low{color:#ff5c47 !important}

  .empty{padding:28px 18px; text-align:center; opacity:.55; font-size:11px; line-height:1.6}
  
  /* ---------- настройки ---------- */
  .settings{padding:18px; min-height:100%}
  .settings h2{font-size:16px; margin:0 0 16px; color:#ececf1}
  .settings .section{margin-bottom:20px}
  .settings .section-title{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#5c5c64; margin-bottom:10px}
  .settings .field{margin-bottom:12px}
  .settings label{display:block; font-size:11px; color:#8b8b93; margin-bottom:4px}
  .settings input[type="number"], .settings input[type="text"]{
    width:100%; padding:8px 10px; background:#1a1a1e; border:1px solid #2a2a2e;
    border-radius:6px; color:#ececf1; font-size:12px; box-sizing:border-box;
  }
  .settings input:focus{outline:none; border-color:#d97757}
  .settings .toggle-row{display:flex; align-items:center; justify-content:space-between; padding:8px 0}
  .settings .toggle-row label{margin:0}
  .settings .switch{position:relative; width:40px; height:22px; flex-shrink:0}
  .settings .switch input{opacity:0; width:0; height:0}
  .settings .slider{position:absolute; inset:0; background:#2a2a2e; border-radius:22px; cursor:pointer; transition:.3s}
  .settings .slider:before{content:""; position:absolute; width:16px; height:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.3s}
  .settings .switch input:checked + .slider{background:#d97757}
  .settings .switch input:checked + .slider:before{transform:translateX(18px)}
  .settings .save-btn{
    width:100%; padding:10px; border:none; border-radius:8px;
    background:#d97757; color:#fff; font-size:12px; cursor:pointer; margin-top:8px;
  }
  .settings .save-btn:hover{background:#c96747}
  .settings .save-btn:disabled{opacity:.6; cursor:not-allowed}
  .settings .saved-msg{font-size:11px; color:#2ECC40; margin-top:8px; text-align:center}
  
  /* ---------- загрузка ---------- */
  .loading-overlay{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px; z-index:100;
    background:var(--shell);
  }
  .loading-overlay.hidden{display:none}
  .loading-spinner{
    width:32px; height:32px;
    border:3px solid #2a2a2e; border-top-color:#d97757;
    border-radius:50%; animation:spin 1s linear infinite;
  }
  .loading-text{font-size:11px; color:#5c5c64; letter-spacing:.05em}
  
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){ .bar i{transition:none} }
</style>
</head>
<body>
<div id="app">
  <header class="pywebview-drag-region">
    <span class="title">AI&nbsp;Usage</span>
    <span class="updated" id="updated">…</span>
    <span class="countdown" id="countdown"></span>
    <button id="btn-refresh" title="">⟳</button>
    <button id="btn-pin" title="">◉</button>
    <button id="btn-tray" title="">⎯</button>
    <button id="btn-close" title="">✕</button>
  </header>

  <div id="pages">
    <div class="page active" id="page-overview">
      <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loading-text">Загрузка данных…</div>
      </div>
    </div>
    <div class="page" id="page-claude"></div>
    <div class="page" id="page-codex"></div>
    <div class="page" id="page-settings"></div>
  </div>

  <nav>
    <button data-page="overview" class="active" id="nav-overview">Обзор</button>
    <button data-page="claude" class="n-claude">Claude</button>
    <button data-page="codex" class="n-codex">Codex</button>

  </nav>
</div>

let DATA = null;
let clockSkew = 0;
let LANG = "ru";

const L10N = {

    "Сессия (5 ч)": "Сессия (5 ч)",

    "Неделя · Sonnet": "Неделя · Sonnet",
    "Неделя · приложения": "Неделя · приложения",

    "Codex CLI не найден": "Codex CLI not found",

function t(key){ return L10N[LANG]?.[key] || L10N["ru"][key] || key; }

// Перевод ошибок и динамических строк: точное совпадение → перевод, иначе как есть
function terr(msg){
  if(!msg) return "";
  // Полное совпадение
  const fullTr = t(msg);
  if(fullTr !== msg) return fullTr;
  // Первая строка (для внутренних ошибок с трейсом)
  const firstLine = msg.split("\n")[0];
  const lineTr = t(firstLine);
  if(lineTr !== firstLine) return lineTr + (msg.includes("\n") ? msg.substring(msg.indexOf("\n")) : "");
  // "Доп. лимит N" → переводим префикс
  if(msg.startsWith("Доп. лимит ")){
    return t("Доп. лимит") + " " + msg.split(" ").slice(2).join(" ");
  }
  return msg;
}

function updateTitles(){
  const btn = id => document.getElementById(id);
  if(btn("btn-refresh")) btn("btn-refresh").title = t("refreshTitle");
  if(btn("btn-pin")) btn("btn-pin").title = t("pinTitle");
  if(btn("btn-tray")) btn("btn-tray").title = t("trayTitle");
  if(btn("btn-close")) btn("btn-close").title = t("closeTitle");
  const lt = btn("loading-text");
  if(lt) lt.textContent = t("loadingData");
  if(btn("nav-overview")) btn("nav-overview").textContent = t("overview");
  if(btn("nav-settings")) btn("nav-settings").textContent = t("settings");
}

const GLYPH = { claude:"✳", codex:"⬡", opencode:"█" };
const THEME = { claude:"th-claude", codex:"th-codex", opencode:"th-opencode" };

/* ---------- утилиты ---------- */
const $ = s => document.querySelector(s);
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function now(){ return Date.now()/1000 + clockSkew; }

function fmtCountdown(epoch){
  if(!epoch) return "";
  let s = Math.max(0, epoch - now());
  const d = Math.floor(s/86400); s -= d*86400;
  const h = Math.floor(s/3600);  s -= h*3600;
  const m = Math.floor(s/60);
  if(d > 0) return `${d} ${t("d")} ${h} ${t("h")}`;
  if(h > 0) return `${h} ${t("h")} ${m} ${t("m")}`;
  return `${m} ${t("m")}`;
}
function fmtClock(epoch){
  if(!epoch) return "";
  const dt = new Date(epoch*1000);
  const t = dt.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  const today = new Date(); 
  const same = dt.toDateString() === today.toDateString();
  return same ? t : dt.toLocaleDateString([], {day:"numeric", month:"short"}) + " " + t;
}
function pctText(w){
  if(w.remaining_pct == null) return "—";
  return (Math.round(w.remaining_pct*10)/10).toLocaleString(LANG === "en" ? "en-US" : "ru-RU");
}
function asciiBar(pctRemaining, width=18){
  if(pctRemaining == null) return "";
  const on = Math.round(width * pctRemaining / 100);
  return "<span>" + "█".repeat(on) + "</span><span class='off'>" + "░".repeat(width-on) + "</span>";
}
function sessionWin(p){
  return (p.windows||[]).find(w => w.id === "session") || (p.windows||[])[0] || null;
}

/* ---------- обзор ---------- */
function renderOverview(){
  const el = $("#page-overview");
  if(!DATA){ el.innerHTML = `<div class='empty'>${t("loading")}</div>`; return; }
  let html = "";
  for(const id of ["claude","codex"]){
    const p = DATA.providers[id] || {};
    const w = sessionWin(p);
    const theme = THEME[id];
    const low = w && w.remaining_pct != null && w.remaining_pct <= 15 ? "low" : "";
    html += `<div class="strip ${theme}" data-goto="${id}">
      <div class="top">
        <span class="glyph">${GLYPH[id]}</span>
        <span class="name">${esc(p.name || id)}</span>
        <span class="pct">${w ? pctText(w) + "<small style='font-size:11px;opacity:.5'>%</small>" : "—"}</span>
      </div>`;
    if(w){
      html += `<div class="sub">
          <span>${esc(t(w.label))} · ${t("remaining")}</span>
          <span>${w.resets_at ? t("resetsIn") + " " + fmtCountdown(w.resets_at) : ""}</span>
        </div>`;
      if(id === "opencode"){
        html += `<div class="bar ${low}"><div class="asciibar ${low}">${asciiBar(w.remaining_pct)}</div></div>`;
      } else {
        html += `<div class="bar ${low}"><i style="width:${w.remaining_pct ?? 0}%"></i></div>`;
      }
    } else {
      html += `<div class="err">${esc(terr(p.error) || t("noData"))}</div>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;
  el.querySelectorAll(".strip").forEach(s =>
    s.addEventListener("click", () => showPage(s.dataset.goto)));
}

/* ---------- детальная страница ---------- */
function renderDetail(id){
  const el = $("#page-" + id);
  const p = DATA && DATA.providers[id];
  if(!p){ el.innerHTML = `<div class='empty'>${t("loading")}</div>`; return; }

  // Статус токена
  const tokenStatus = DATA && DATA.token_status && DATA.token_status[id];
  let statusHtml = "";
  if(tokenStatus){
    const labels = {valid: t("tokenActive"), expiring: t("tokenExpiring"), expired: t("tokenExpired")};
    statusHtml = `<span class="token-status ${tokenStatus.status}"><span class="dot"></span>${labels[tokenStatus.status]}</span>`;
  }

  let html = `<div class="detail ${THEME[id]}">
    <div class="brand"><span class="glyph">${GLYPH[id]}</span><h1>${esc(p.name)}</h1>${statusHtml}</div>
    <div class="plan">${esc(p.meta && (p.meta.plan || p.meta.subscription) || t("subscription"))}</div>`;

  for(const w of (p.windows || [])){
    const low = w.remaining_pct != null && w.remaining_pct <= 15 ? "low" : "";
    html += `<div class="win">
      <div class="head">
        <span class="label">${esc(t(w.label))}</span>
        <span class="bigpct ${id==='opencode'&&low?'low':''}">${pctText(w)}<small> % ${t("remaining")}</small></span>
      </div>`;
    if(id === "opencode"){
      html += `<div class="bar"><div class="asciibar ${low}">${asciiBar(w.remaining_pct, 24)}</div></div>`;
    } else {
      html += `<div class="bar ${low}"><i style="width:${w.remaining_pct ?? 0}%"></i></div>`;
    }
    if(w.used_usd != null && w.limit_usd != null){
      html += `<div class="usd">$${(+w.used_usd).toFixed(2)}${t("of")}$${(+w.limit_usd).toFixed(2)}</div>`;
    }
    if(w.resets_at){
      html += `<div class="reset" data-reset="${w.resets_at}">
        <span>${t("resetsIn")} ${fmtCountdown(w.resets_at)}</span>
        <span>${fmtClock(w.resets_at)}</span></div>`;
    }
    html += `</div>`;
  }

  if(!p.ok && p.error){
    html += `<div class="error">${esc(terr(p.error))}</div>`;
    if(id === "claude" || id === "codex"){
      html += `<button class="login-btn" data-provider="${id}">${t("loginBtn")}</button>`;
    }
  }

  // мета-инфо
  const metaBits = [];
  if(p.meta){
    if(p.meta.credits != null) metaBits.push(t("credits") + ": " + p.meta.credits);
    if(p.meta.balance_usd != null) metaBits.push(t("balance") + ": $" + (+p.meta.balance_usd).toFixed(2));
    if(p.meta.endpoint) metaBits.push(t("source") + ": " + p.meta.endpoint);
    if(p.meta.token_stale) metaBits.push(t("tokenStale"));
  }
  if(metaBits.length){
    html += `<div class="meta">${metaBits.map(esc).join("<br>")}</div>`;
  }
  html += `</div>`;
  el.innerHTML = html;
  
  el.querySelectorAll(".login-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const provider = btn.dataset.provider;
      btn.disabled = true;
      btn.textContent = t("starting");
      
      try {
        const result = provider === "claude" 
          ? await window.pywebview.api.login_claude()
          : await window.pywebview.api.login_codex();
        
        if(result.success){
          btn.textContent = terr(result.output);
          // Автообновление через 30 сек
          setTimeout(() => window.pywebview.api.refresh_now(), 30000);
        } else {
          btn.textContent = terr(result.output) || t("error");
          btn.disabled = false;
        }
      } catch(e){
        btn.textContent = t("error");
        btn.disabled = false;
      }
    });
  });
}

function renderAll(){
  renderOverview();
  for(const id of ["claude","codex"]) renderDetail(id);
  renderSettings();
  if(DATA && DATA.updated_at){
    $("#updated").textContent = t("updated") + " " + fmtClock(DATA.updated_at);
    // Скрываем оверлей загрузки
    const loading = $("#loading");
    if(loading) loading.classList.add("hidden");
  }
}

function renderSettings(){
  const el = $("#page-settings");
  if(!DATA || !DATA._config) return;
  const cfg = DATA._config;
  
  // Сохраняем текущие значения полей если они есть
  const existingRefresh = $("#cfg-refresh")?.value;
  const existingWidth = $("#cfg-width")?.value;
  const existingHeight = $("#cfg-height")?.value;
  const existingOnTop = $("#cfg-ontop")?.checked;
  
  // Если поля уже есть и пользователь редактирует — не пересоздаём
  if(existingRefresh && document.activeElement?.id?.startsWith("cfg-")) return;
  
  el.innerHTML = `
    <div class="settings">
      <h2>${t("settings")}</h2>
      <div class="section">
        <div class="section-title">${t("general")}</div>
        <div class="field">
          <label>${t("refreshInterval")}</label>
          <input type="number" id="cfg-refresh" value="${cfg.refresh_interval_sec || 60}" min="15" max="600">
        </div>
        <div class="field">
          <label>${t("language")}</label>
          <select id="cfg-lang" style="width:100%; padding:8px 10px; background:#1a1a1e; border:1px solid #2a2a2e; border-radius:6px; color:#ececf1; font-size:12px; box-sizing:border-box;">
            <option value="ru" ${(cfg.language || 'ru') === 'ru' ? 'selected' : ''}>Русский</option>
            <option value="en" ${cfg.language === 'en' ? 'selected' : ''}>English</option>
          </select>
        </div>
      </div>
      <div class="section">
        <div class="section-title">${t("winSection")}</div>
        <div class="field">
          <label>${t("width")}</label>
          <input type="number" id="cfg-width" value="${cfg.window?.width || 380}" min="200" max="800">
        </div>
        <div class="field">
          <label>${t("height")}</label>
          <input type="number" id="cfg-height" value="${cfg.window?.height || 600}" min="300" max="1200">
        </div>
        <div class="toggle-row">
          <label>${t("onTop")}</label>
          <label class="switch">
            <input type="checkbox" id="cfg-ontop" ${cfg.window?.on_top ? 'checked' : ''}>
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <button class="save-btn" id="btn-save-settings">${t("save")}</button>
      <div class="saved-msg" id="saved-msg" style="display:none">${t("saved")}</div>
    </div>
  `;
  
  $("#btn-save-settings").addEventListener("click", async () => {
    const lang = $("#cfg-lang")?.value || LANG;
    const newCfg = {
      language: lang,
      refresh_interval_sec: parseInt($("#cfg-refresh").value) || 60,
      window: {
        width: parseInt($("#cfg-width").value) || 380,
        height: parseInt($("#cfg-height").value) || 600,
        on_top: $("#cfg-ontop").checked,
      }
    };
    const ok = await window.pywebview.api.save_config_api(newCfg);
    if(ok === true){
      const msg = $("#saved-msg");
      msg.style.display = "block";
      setTimeout(() => msg.style.display = "none", 2000);
      // Применяем язык сразу, не ждём pull
      if(lang !== LANG){
        LANG = lang;
        updateTitles();
      }
      pullInterval = newCfg.refresh_interval_sec * 1000;
      lastPullTime = Date.now();
      setTimeout(() => pull(true), 500);
    }
  });
  // Toggle on_top из настроек — синхронизируем с кнопкой в хедере
  $("#cfg-ontop").addEventListener("change", async () => {
    const v = await window.pywebview.api.toggle_on_top();
    // Обновляем кнопку в хедере
    const pinBtn = $("#btn-pin");
    if(pinBtn) pinBtn.classList.toggle("pin-on", !!v);
  });
}

let lastPullTime = 0;
let pullInterval = 5000;
let lastUpdatedAt = 0;

function tickCountdown(){
  if(!lastPullTime) return;
  const elapsed = Date.now() - lastPullTime;
  const remaining = Math.max(0, Math.ceil((pullInterval - elapsed) / 1000));
  $("#countdown").textContent = remaining > 0 ? remaining + t("sec") : "";
}

/* ---------- навигация ---------- */
function showPage(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  $("#page-" + id).classList.add("active");
  document.querySelectorAll("nav button").forEach(b =>
    b.classList.toggle("active", b.dataset.page === id));
}
document.querySelectorAll("nav button").forEach(b =>
  b.addEventListener("click", () => showPage(b.dataset.page)));

/* ---------- связь с бэкендом ---------- */
async function pull(isManual = false){
  if(!window.pywebview || !window.pywebview.api) return;
  try{
    const snap = await window.pywebview.api.get_data();
    if(snap && snap.updated_at){
      clockSkew = snap.now - Date.now()/1000;
      DATA = snap;
      pullInterval = (snap.refresh_interval_sec || 60) * 1000;
      // Синхронизируем язык из конфига
      const oldLang = LANG;
      if(!LANG || (DATA._config && DATA._config.language && DATA._config.language !== LANG)){
        LANG = (DATA._config && DATA._config.language) || "ru";
      }
      if(oldLang !== LANG) updateTitles();
      // Сбрасываем таймер когда данные действительно обновились или при ручном обновлении
      if(isManual || snap.updated_at !== lastUpdatedAt){
        lastPullTime = Date.now();
        lastUpdatedAt = snap.updated_at;
      }
      renderAll();
      // Инициализируем кнопку pin при первом pull
      if(!isManual && DATA && DATA.on_top !== undefined){
        const pinBtn = $("#btn-pin");
        pinBtn.classList.toggle("pin-on", !!DATA.on_top);
      }
    }
  }catch(e){ /* бэкенд ещё поднимается */ }
}

window.addEventListener("pywebviewready", () => {
  pull();
  setInterval(() => pull(false), 5000);
  setInterval(() => { if(DATA) renderAll(); }, 30000);
  setInterval(tickCountdown, 1000);
  updateTitles();
  let refreshDebounce = false;
  $("#btn-refresh").addEventListener("click", async () => {
    if(refreshDebounce) return;
    refreshDebounce = true;
    $("#btn-refresh").style.opacity = "0.5";
    try {
      await window.pywebview.api.refresh_now();
      setTimeout(() => pull(true), 1500);
      setTimeout(() => pull(true), 4000);
    } finally {
      setTimeout(() => {
        refreshDebounce = false;
        $("#btn-refresh").style.opacity = "";
      }, 5000);
    }
  });
  $("#btn-close").addEventListener("click", () => window.pywebview.api.close());
  const trayBtn = $("#btn-tray");
  if(trayBtn) {
    trayBtn.addEventListener("click", async () => {
      const result = await window.pywebview.api.minimize_to_tray();
      if(!result) {
        console.log("Tray not available");
      }
    });
  }
  const pinBtn = $("#btn-pin");
  pinBtn.addEventListener("click", async () => {
    const v = await window.pywebview.api.toggle_on_top();
    if(v !== null){
      pinBtn.classList.toggle("pin-on", v);
      // Синхронизируем toggle в настройках
      const cfgOnTop = $("#cfg-ontop");
      if(cfgOnTop) cfgOnTop.checked = !!v;
    }
  });
  setInterval(async () => {
    if(DATA) {
      await window.pywebview.api.update_tray_icon();
    }
  }, 5000);
});

// демо-режим при открытии файла в браузере без pywebview

  if(window.pywebview) return;
  clockSkew = 0;

      {id:"week",label:"Неделя",remaining_pct:41,resets_at:Date.now()/1000+3600*52},
      {id:"week_opus",label:"Неделя · Opus",remaining_pct:88,resets_at:Date.now()/1000+3600*52}]},
    codex:{id:"codex",name:"Codex CLI",ok:true,meta:{plan:"plus"},windows:[
      {id:"session",label:"Сессия (5 ч)",remaining_pct:73,resets_at:Date.now()/1000+4980},
      {id:"week",label:"Неделя",remaining_pct:12,resets_at:Date.now()/1000+3600*30}]},
    opencode:{id:"opencode",name:"OpenCode",ok:true,meta:{plan:"go"},windows:[
      {id:"session",label:"Сессия (5 ч)",remaining_pct:81,used_usd:2.3,limit_usd:12,resets_at:Date.now()/1000+9000},
      {id:"week",label:"Неделя",remaining_pct:70,used_usd:9,limit_usd:30,resets_at:Date.now()/1000+3600*90},
      {id:"month",label:"Месяц",remaining_pct:75,used_usd:15,limit_usd:60,resets_at:Date.now()/1000+3600*400}]}
  }};
  renderAll();
}, 800);
</script>
